<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" width="1100" height="880">
  <style>text{font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif}</style>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
    <marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6b7280"/></marker>
    <marker id="at" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0891b2"/></marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1100" height="880" fill="#ffffff"/>
  <text x="550" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">AI Watchdog - Unified Harness</text>
  <text x="550" y="48" text-anchor="middle" fill="#6b7280" font-size="11">One daemon, four rhythms, one knowledge store</text>
  <rect x="400" y="62" width="220" height="50" rx="12" fill="#2563eb" stroke="#1d4ed8" stroke-width="2" filter="url(#sh)"/>
  <text x="510" y="84" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">watchdog.sh daemon</text>
  <text x="510" y="98" text-anchor="middle" fill="#dbeafe" font-size="10">macOS LaunchAgent 7x24</text>
  <rect x="20" y="62" width="160" height="100" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="80" text-anchor="middle" fill="#374151" font-size="10" font-weight="600">AI Sessions</text>
  <text x="30" y="98" fill="#6b7280" font-size="9">~/.claude/projects/</text>
  <text x="30" y="116" fill="#6b7280" font-size="9">~/.codex/history.jsonl</text>
  <text x="30" y="134" fill="#6b7280" font-size="9">~/.orba/</text>
  <line x1="180" y1="105" x2="398" y2="87" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ab)"/>
  <rect x="860" y="62" width="220" height="100" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="970" y="80" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">MCP Targets</text>
  <text x="872" y="98" fill="#991b1b" font-size="9">KILL: orba-context/figma/playwright-mcp...</text>
  <text x="872" y="114" fill="#166534" font-size="9">SAFE: claude/codex/Cursor/Warp</text>
  <line x1="622" y1="87" x2="858" y2="87" stroke="#dc2626" stroke-width="1" marker-end="url(#ar)"/>
  <rect x="20" y="190" width="240" height="150" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="28" y="196" width="36" height="18" rx="9" fill="#93c5fd"/>
  <text x="46" y="209" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">30s</text>
  <text x="140" y="226" text-anchor="middle" fill="#111827" font-size="12" font-weight="600">Process Guard</text>
  <text x="140" y="242" text-anchor="middle" fill="#6b7280" font-size="9">(standalone, no LLM needed)</text>
  <text x="34" y="260" fill="#374151" font-size="9">- Kill orphan MCP (PPID=1)</text>
  <text x="34" y="276" fill="#374151" font-size="9">- Memory guard: emergency/targeted</text>
  <text x="34" y="292" fill="#374151" font-size="9">- Swarm: same MCP &gt;2 copies</text>
  <text x="34" y="308" fill="#374151" font-size="9">- Session recovery: 1-click resume</text>
  <text x="34" y="324" fill="#374151" font-size="9">- Log janitor: debug logs &gt;3d</text>
  <rect x="290" y="190" width="240" height="150" rx="10" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="298" y="196" width="50" height="18" rx="9" fill="#a78bfa"/>
  <text x="323" y="209" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">30min</text>
  <text x="410" y="226" text-anchor="middle" fill="#111827" font-size="12" font-weight="600">Knowledge Factory</text>
  <text x="410" y="242" text-anchor="middle" fill="#7c3aed" font-size="9">(PRODUCES knowledge from raw sessions)</text>
  <text x="304" y="260" fill="#374151" font-size="9">- Scan Claude/Codex .jsonl files</text>
  <text x="304" y="276" fill="#374151" font-size="9">- LLM summarize: 5-section digest</text>
  <text x="304" y="292" fill="#374151" font-size="9">- Write brain/learnings.md</text>
  <text x="304" y="308" fill="#374151" font-size="9">- Write brain/user-focus.md</text>
  <text x="304" y="324" fill="#374151" font-size="9">- PageIndex reindex</text>
  <line x1="532" y1="265" x2="558" y2="265" stroke="#9333ea" stroke-width="2" marker-end="url(#ap)"/>
  <text x="545" y="258" text-anchor="middle" fill="#9333ea" font-size="8">feeds</text>
  <rect x="560" y="190" width="240" height="150" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="568" y="196" width="50" height="18" rx="9" fill="#06b6d4"/>
  <text x="593" y="209" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">10min</text>
  <text x="680" y="226" text-anchor="middle" fill="#111827" font-size="12" font-weight="600">Agent Judge</text>
  <text x="680" y="242" text-anchor="middle" fill="#0891b2" font-size="9">(DECIDES what to do with knowledge)</text>
  <text x="574" y="260" fill="#374151" font-size="9">- Check: brain ready? CLAUDE.md stale?</text>
  <text x="574" y="276" fill="#374151" font-size="9">- LLM decides: inject / refresh / noop</text>
  <text x="574" y="292" fill="#374151" font-size="9">- Health: memory &gt;90%? MCP &gt;20?</text>
  <text x="574" y="308" fill="#374151" font-size="9">- Execute: dispatch to functions</text>
  <text x="574" y="324" fill="#374151" font-size="9">- Log decisions to memory/session/</text>
  <line x1="802" y1="265" x2="858" y2="265" stroke="#0891b2" stroke-width="2" marker-end="url(#at)"/>
  <rect x="860" y="230" width="220" height="70" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2" filter="url(#sh)"/>
  <text x="970" y="258" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">project/CLAUDE.md</text>
  <text x="970" y="274" text-anchor="middle" fill="#166534" font-size="9">Next AI session auto-has context</text>
  <text x="970" y="288" text-anchor="middle" fill="#6b7280" font-size="8">auto-injected by agent when brain is ready</text>
  <rect x="830" y="190" width="250" height="30" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <rect x="838" y="193" width="34" height="18" rx="9" fill="#fdba74"/>
  <text x="855" y="206" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">0:00</text>
  <text x="970" y="208" text-anchor="middle" fill="#c2410c" font-size="10" font-weight="600">Nightly: score + archive + reindex + skill report</text>
  <line x1="460" y1="112" x2="140" y2="188" stroke="#2563eb" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="500" y1="112" x2="410" y2="188" stroke="#9333ea" stroke-width="1.2" marker-end="url(#ap)"/>
  <line x1="540" y1="112" x2="680" y2="188" stroke="#0891b2" stroke-width="1.2" marker-end="url(#at)"/>
  <line x1="580" y1="112" x2="950" y2="188" stroke="#ea580c" stroke-width="1.2" marker-end="url(#ao)"/>
  <rect x="290" y="355" width="510" height="36" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="545" y="372" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">Factory PRODUCES knowledge (brain files, summaries) | Agent JUDGES quality and PUSHES to CLAUDE.md</text>
  <text x="545" y="384" text-anchor="middle" fill="#92400e" font-size="9">Without Factory, Agent has nothing to judge. Without Agent, knowledge stays in ~/billion-smart and never reaches CLAUDE.md.</text>
  <rect x="20" y="410" width="1060" height="260" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="36" y="432" fill="#166534" font-size="12" font-weight="600">~/billion-smart/ - Knowledge Store</text>
  <text x="36" y="448" fill="#6b7280" font-size="9">Per-project knowledge organized by category. Each project (devin, orba-desktop, ai-watchdog, _global...) has the same structure:</text>
  <rect x="30" y="460" width="240" height="95" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="38" y="476" fill="#111827" font-size="10" font-weight="600">brain/</text>
  <text x="42" y="494" fill="#1e40af" font-size="9" font-weight="600">index.md</text>
  <text x="94.0" y="494" fill="#6b7280" font-size="8">Project overview + architecture</text>
  <text x="42" y="510" fill="#1e40af" font-size="9" font-weight="600">user-focus.md</text>
  <text x="121.5" y="510" fill="#6b7280" font-size="8">YOUR recent messages (highest weight)</text>
  <text x="42" y="526" fill="#1e40af" font-size="9" font-weight="600">learnings.md</text>
  <text x="116.0" y="526" fill="#6b7280" font-size="8">AI-distilled learnings from sessions</text>
  <text x="150" y="549" text-anchor="middle" fill="#6b7280" font-size="8" font-style="italic">Injected into CLAUDE.md by Agent</text>
  <rect x="280" y="460" width="240" height="95" rx="8" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="288" y="476" fill="#111827" font-size="10" font-weight="600">summaries/</text>
  <text x="292" y="494" fill="#5b21b6" font-size="9" font-weight="600">YYYYMMDD_HHMM.md</text>
  <text x="388.0" y="494" fill="#6b7280" font-size="8">Session digest (every 30min)</text>
  <text x="292" y="510" fill="#5b21b6" font-size="9" font-weight="600">5 sections:</text>
  <text x="360.5" y="510" fill="#6b7280" font-size="8">Worked / Failed / Decisions</text>
  <text x="292" y="526" fill="#6b7280" font-size="8">Learnings / Open Issues</text>
  <text x="400" y="549" text-anchor="middle" fill="#6b7280" font-size="8" font-style="italic">Raw material for brain files</text>
  <rect x="530" y="460" width="240" height="95" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="538" y="476" fill="#111827" font-size="10" font-weight="600">reports/ + best-practices/</text>
  <text x="542" y="494" fill="#c2410c" font-size="9" font-weight="600">skill-report-*.md</text>
  <text x="643.5" y="494" fill="#6b7280" font-size="8">Daily tool usage Top 5 + tips</text>
  <text x="542" y="510" fill="#c2410c" font-size="9" font-weight="600">superpowers.md</text>
  <text x="627.0" y="510" fill="#6b7280" font-size="8">From obra/superpowers patterns</text>
  <text x="542" y="526" fill="#c2410c" font-size="9" font-weight="600">compound-engineering.md</text>
  <text x="676.5" y="526" fill="#6b7280" font-size="8">Compound loop methodology</text>
  <text x="650" y="549" text-anchor="middle" fill="#6b7280" font-size="8" font-style="italic">Generated at midnight + curated</text>
  <rect x="780" y="460" width="290" height="95" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="788" y="476" fill="#111827" font-size="10" font-weight="600">pageindex-workspace/</text>
  <text x="792" y="494" fill="#0e7490" font-size="9" font-weight="600">Semantic vector index</text>
  <text x="915.5" y="494" fill="#6b7280" font-size="8">Over ALL markdown files</text>
  <text x="792" y="510" fill="#0e7490" font-size="9" font-weight="600">Query:</text>
  <text x="833.0" y="510" fill="#6b7280" font-size="8">"What did I learn about X?"</text>
  <text x="792" y="526" fill="#0e7490" font-size="9" font-weight="600">Reindexed:</text>
  <text x="855.0" y="526" fill="#6b7280" font-size="8">After summaries + at midnight</text>
  <text x="925" y="549" text-anchor="middle" fill="#6b7280" font-size="8" font-style="italic">Enables knowledge retrieval</text>
  <text x="36" y="572" fill="#111827" font-size="10" font-weight="600">Also per-project:</text>
  <text x="160" y="572" fill="#374151" font-size="9" font-weight="600">plans/</text>
  <text x="204" y="572" fill="#6b7280" font-size="9">Implementation plans from planning sessions</text>
  <text x="160" y="588" fill="#374151" font-size="9" font-weight="600">learnings/</text>
  <text x="228" y="588" fill="#6b7280" font-size="9">Extracted learnings (structured)</text>
  <text x="160" y="604" fill="#374151" font-size="9" font-weight="600">.archive/</text>
  <text x="222" y="604" fill="#6b7280" font-size="9">Dormant projects archived at midnight</text>
  <path d="M 410,342 L 410,395 L 400,395 L 400,410" fill="none" stroke="#9333ea" stroke-width="1.2" marker-end="url(#ap)"/>
  <text x="418" y="398" fill="#9333ea" font-size="8">writes</text>
  <path d="M 680,342 L 680,395 L 970,395 L 970,410" fill="none" stroke="#0891b2" stroke-width="1.2" marker-end="url(#at)"/>
  <text x="690" y="398" fill="#0891b2" font-size="8">reads + judges</text>
  <rect x="20" y="690" width="340" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="190" y="718" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600">Web Dashboard :7474</text>
  <text x="190" y="736" text-anchor="middle" fill="#6b7280" font-size="9">Processes | Sessions | Agent Decisions | Brain Inject | Skill Report</text>
  <text x="190" y="752" text-anchor="middle" fill="#6b7280" font-size="9">Kill buttons | Digest | Run Agent Now</text>
  <rect x="390" y="690" width="340" height="80" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="560" y="712" text-anchor="middle" fill="#111827" font-size="11" font-weight="600">CLI Commands</text>
  <text x="402" y="728" fill="#6b7280" font-size="9">hermes agent  Run LLM agent cycle now</text>
  <text x="402" y="742" fill="#6b7280" font-size="9">hermes nightly  Midnight review + skill report</text>
  <text x="402" y="756" fill="#6b7280" font-size="9">hermes inject [proj]  Push brain to CLAUDE.md</text>
  <text x="402" y="770" fill="#6b7280" font-size="9">hermes tracker  Tool usage stats (24h)</text>
  <rect x="760" y="690" width="320" height="80" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="920" y="712" text-anchor="middle" fill="#111827" font-size="11" font-weight="600">Compound Engineering Loop</text>
  <text x="772" y="730" fill="#9333ea" font-size="9" font-weight="600">After EVERY task:</text>
  <text x="772" y="744" fill="#374151" font-size="9">1. What worked? -&gt; brain/learnings.md (30min auto)</text>
  <text x="772" y="758" fill="#374151" font-size="9">2. What failed? -&gt; summaries/ anti-patterns (30min auto)</text>
  <text x="772" y="772" fill="#0891b2" font-size="9" font-weight="600">3. Update CLAUDE.md -&gt; Agent auto-injects when ready</text>
  <rect x="20" y="790" width="700" height="32" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <line x1="30" y1="808" x2="52" y2="808" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="58" y="812" fill="#6b7280" font-size="9">30s guard</text>
  <line x1="120" y1="808" x2="142" y2="808" stroke="#0891b2" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="148" y="812" fill="#6b7280" font-size="9">10min agent judge</text>
  <line x1="240" y1="808" x2="262" y2="808" stroke="#9333ea" stroke-width="1.5" marker-end="url(#ap)"/>
  <text x="268" y="812" fill="#6b7280" font-size="9">30min knowledge factory</text>
  <line x1="400" y1="808" x2="422" y2="808" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="428" y="812" fill="#6b7280" font-size="9">midnight nightly</text>
  <line x1="530" y1="808" x2="552" y2="808" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="558" y="812" fill="#6b7280" font-size="9">auto-inject to CLAUDE.md</text>
  <text x="1080" y="870" text-anchor="end" fill="#d1d5db" font-size="8">ai-watchdog unified harness | fireworks-tech-graph Style 1</text>
</svg>